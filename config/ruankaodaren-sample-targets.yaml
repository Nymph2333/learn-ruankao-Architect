# Notes:
# - status = existing_success: already crawled and parsed; intermediate JSON exists
# - status = quarantined: crawled but body/target mismatch or duplicate; do not re-attempt
# - status = pending_capture: controlled exact-leaf target; run pnpm crawl:ruankaodaren -- --target "<title_hint>" --require-leaf
# - expected_shape = leaf_knowledge_point: run acquisition must use --require-leaf
# - require_preflight = true: must pass preflight gate before parsing counts as success
# - source_catalog = verification/generated/phase3_11_reachable_leaf_catalog.md: Phase 3.12 reachable-leaf target
# - broad hints such as 数据库 / 网络 / 架构 are not valid targets
# - expected_classification: UNKNOWN until a sample is captured and parsed
